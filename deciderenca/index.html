<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DecideRenca</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div id="app">

    <!-- Panel izquierdo -->
    <aside id="panel">

      <div id="panel-header">
        <div id="breadcrumb">
          <span class="app-title">DecideRenca</span>
        <span id="bc-renca" class="bc-link">Renca</span>
          <span id="bc-sep" class="hidden"> › </span>
          <span id="bc-zone" class="hidden"></span>
        </div>
        <div id="election-tabs"></div>
      </div>

      <div id="panel-meta">
        <span id="meta-votos"></span>
      </div>

      <div id="layer-bar">
        <span class="layer-label">Ver por:</span>
        <button class="layer-btn active" data-layer="uvs">U. Vecinales</button>
        <button class="layer-btn" data-layer="macrozonas">Macrozonas</button>
        <button class="layer-btn" data-layer="locales">Colegios</button>
      </div>

      <div id="valid-bar">
        <span class="layer-label">Votos:</span>
        <div id="valid-toggle">
          <button class="vtoggle active" data-v="total">Totales</button>
          <button class="vtoggle" data-v="valid">Válidos</button>
        </div>
      </div>

      <div id="pacto-bar"></div>

      <div id="candidate-list"></div>
    </aside>

    <!-- Mapa -->
    <div id="map"></div>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/app.js"></script>
  <script src="js/map.js"></script>
  <script src="js/panel.js"></script>
</body>
</html>
